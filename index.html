<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UPN → SEPA QR</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #f5f5f7;
    color: #1d1d1f;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  main {
    max-width: 640px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }
  h1 {
    font-size: 28px;
    font-weight: 600;
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }
  p.lede {
    color: #6e6e73;
    margin: 0 0 28px;
  }
  #dropzone {
    border: 2px dashed #c7c7cc;
    border-radius: 16px;
    padding: 56px 20px;
    text-align: center;
    cursor: pointer;
    background: #fff;
    transition: border-color .15s, background .15s, transform .1s;
    user-select: none;
  }
  #dropzone:hover, #dropzone.drag {
    border-color: #007aff;
    background: #f0f7ff;
  }
  #dropzone:active { transform: scale(.995); }
  #dropzone p { margin: 0; color: #6e6e73; }
  kbd {
    background: #fff;
    padding: 1px 6px;
    border-radius: 4px;
    border: 1px solid #d1d1d6;
    font-size: 12px;
    font-family: inherit;
  }
  #error {
    margin-top: 16px;
    padding: 12px 16px;
    background: #ffe5e5;
    color: #8a1a1a;
    border-radius: 10px;
    font-size: 14px;
    white-space: pre-wrap;
    word-break: break-word;
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  }
  .hidden { display: none !important; }
  #result {
    margin-top: 24px;
    background: #fff;
    border-radius: 16px;
    padding: 28px;
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
  }
  #qr {
    display: flex;
    justify-content: center;
    margin-bottom: 24px;
  }
  #qr svg {
    width: min(280px, 70vw);
    height: auto;
    display: block;
  }
  dl {
    margin: 0;
    display: grid;
    grid-template-columns: max-content 1fr;
    gap: 6px 16px;
    font-size: 14px;
  }
  dt { color: #6e6e73; }
  dd { margin: 0; word-break: break-word; }
  details {
    margin-top: 22px;
    font-size: 13px;
  }
  summary { cursor: pointer; color: #6e6e73; }
  pre {
    margin: 10px 0 0;
    background: #f5f5f7;
    padding: 12px;
    border-radius: 8px;
    overflow-x: auto;
    font-size: 12px;
    white-space: pre-wrap;
    word-break: break-all;
  }
  footer {
    margin-top: 28px;
    font-size: 12px;
    color: #8e8e93;
    text-align: center;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #000; color: #f5f5f7; }
    #dropzone { background: #1c1c1e; border-color: #3a3a3c; }
    #dropzone:hover, #dropzone.drag { background: #1a2030; border-color: #0a84ff; }
    #dropzone p, dt, summary, p.lede, footer { color: #98989d; }
    kbd { background: #2c2c2e; border-color: #3a3a3c; color: #f5f5f7; }
    #result { background: #1c1c1e; box-shadow: none; }
    pre { background: #2c2c2e; }
    #error { background: #3a1a1a; color: #ff9b9b; }
    #qr svg { background: #fff; padding: 12px; border-radius: 8px; }
  }
</style>
</head>
<body>
<main>
  <h1>UPN → SEPA QR</h1>
  <p class="lede">Paste a Slovenian UPN QR code. Get a SEPA QR you can scan in Revolut.</p>

  <div id="dropzone" tabindex="0">
    <p>Click to upload, paste an image with <kbd>⌘V</kbd>, or drop one here</p>
    <input type="file" id="fileInput" accept="image/*" hidden>
  </div>

  <div id="error" class="hidden"></div>

  <div id="result" class="hidden">
    <div id="qr"></div>
    <dl id="details"></dl>
    <details>
      <summary>SEPA payload (raw)</summary>
      <pre id="payload"></pre>
    </details>
  </div>

  <footer>Runs entirely in your browser. Nothing leaves the page.</footer>
</main>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
<script>
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const errorEl = document.getElementById('error');
const resultEl = document.getElementById('result');
const qrEl = document.getElementById('qr');
const detailsEl = document.getElementById('details');
const payloadEl = document.getElementById('payload');

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileInput.click(); }
});
fileInput.addEventListener('change', (e) => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
  fileInput.value = '';
});

['dragenter', 'dragover'].forEach(ev =>
  dropzone.addEventListener(ev, (e) => {
    e.preventDefault();
    dropzone.classList.add('drag');
  })
);
['dragleave', 'drop'].forEach(ev =>
  dropzone.addEventListener(ev, () => dropzone.classList.remove('drag'))
);
dropzone.addEventListener('drop', (e) => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});

window.addEventListener('paste', (e) => {
  const items = e.clipboardData?.items || [];
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      const file = item.getAsFile();
      if (file) { handleFile(file); return; }
    }
  }
  const text = e.clipboardData?.getData('text') || '';
  if (text.trim().startsWith('UPNQR')) processUPN(text);
});

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => decodeQR(img);
    img.onerror = () => showError('Could not load that file as an image.');
    img.src = e.target.result;
  };
  reader.onerror = () => showError('Could not read that file.');
  reader.readAsDataURL(file);
}

function decodeQR(img) {
  const canvas = document.createElement('canvas');
  // Cap size to keep jsQR fast on huge screenshots
  const max = 2000;
  const scale = Math.min(1, max / Math.max(img.naturalWidth, img.naturalHeight));
  canvas.width = Math.round(img.naturalWidth * scale);
  canvas.height = Math.round(img.naturalHeight * scale);
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const code = jsQR(data.data, data.width, data.height, { inversionAttempts: 'attemptBoth' });
  console.group('[UPN→SEPA] QR decode');
  console.log('Image size (raw):', img.naturalWidth, '×', img.naturalHeight);
  console.log('Image size (decoded):', canvas.width, '×', canvas.height);
  if (!code) {
    console.warn('jsQR returned null — no QR detected.');
    console.groupEnd();
    showError('No QR code detected. Try a sharper or larger image.');
    return;
  }

  // UPN QR uses ISO-8859-2 (Latin-2) with ECI mode — jsQR returns empty .data
  // for that, but the raw bytes are intact in .binaryData. Prefer that route.
  let text = code.data;
  if (code.binaryData && code.binaryData.length) {
    const bytes = new Uint8Array(code.binaryData);
    const looksLikeUPN = bytes.length >= 5 &&
      bytes[0] === 0x55 && bytes[1] === 0x50 && bytes[2] === 0x4E &&
      bytes[3] === 0x51 && bytes[4] === 0x52;
    if (looksLikeUPN || !text) {
      text = new TextDecoder('iso-8859-2').decode(bytes);
      console.log('Re-decoded binaryData as ISO-8859-2.');
    }
  }
  console.log('jsQR raw data string:', JSON.stringify(code.data));
  console.log('jsQR raw data (visible):', code.data);
  console.log('Length:', code.data.length);
  console.log('First 8 char codes:', [...code.data.slice(0, 8)].map(c => c.charCodeAt(0).toString(16).padStart(4, '0')).join(' '));
  console.log('binaryData (bytes):', code.binaryData);
  if (code.binaryData) {
    const bytes = new Uint8Array(code.binaryData);
    console.log('First 32 bytes (hex):', [...bytes.slice(0, 32)].map(b => b.toString(16).padStart(2, '0')).join(' '));
    try {
      const utf8 = new TextDecoder('utf-8', { fatal: false }).decode(bytes);
      const latin2 = new TextDecoder('iso-8859-2', { fatal: false }).decode(bytes);
      const win1250 = new TextDecoder('windows-1250', { fatal: false }).decode(bytes);
      console.log('Decoded as UTF-8:', utf8);
      console.log('Decoded as ISO-8859-2:', latin2);
      console.log('Decoded as Windows-1250:', win1250);
    } catch (e) {
      console.warn('Re-decode failed:', e);
    }
  }
  console.log('chunks:', code.chunks);
  console.log('version:', code.version);
  console.log('Final text used for parsing:', JSON.stringify(text));
  console.groupEnd();
  processUPN(text);
}

function processUPN(text) {
  console.group('[UPN→SEPA] Parse');
  console.log('Input text:', JSON.stringify(text));
  console.log('Lines:', text.split(/\r?\n/));
  try {
    const upn = parseUPN(text);
    console.log('Parsed UPN:', upn);
    const epc = buildEPC(upn);
    console.log('Built EPC payload:', JSON.stringify(epc));
    console.groupEnd();
    renderResult(upn, epc);
  } catch (err) {
    console.error('Parse error:', err);
    if (err.decoded) {
      console.error('Full decoded content:', JSON.stringify(err.decoded));
      console.error('Decoded as lines:', err.decoded.split(/\r?\n/));
    }
    console.groupEnd();
    if (err.decoded) {
      showError(`${err.message}\n\nDecoded content (first 200 chars):\n${err.preview}\n\n→ Open DevTools console for full output.`);
    } else {
      showError(err.message);
    }
  }
}

// UPN QR field layout (0-indexed lines):
//  0 UPNQR  1 payerIBAN  2 polog  3 dvig  4 payerRef
//  5 payerName  6 payerStreet  7 payerCity
//  8 amount (11 digits, last 2 are cents)
//  9 paymentDate  10 urgent  11 purposeCode  12 purposeText
// 13 dueDate  14 recipientIBAN  15 recipientRef
// 16 recipientName  17 recipientStreet  18 recipientCity
// 19 controlSum
function parseUPN(text) {
  // Strip BOM and leading whitespace, normalise line endings
  const clean = text.replace(/^﻿/, '').replace(/^\s+/, '');
  const lines = clean.split(/\r?\n/).map(l => l ?? '');
  if (lines[0].trim().toUpperCase() !== 'UPNQR') {
    const preview = clean.substring(0, 200).replace(/\n/g, ' ⏎ ');
    const err = new Error('Not a UPN QR code — UPNQR header missing.');
    err.decoded = clean;
    err.preview = preview;
    throw err;
  }
  while (lines.length < 20) lines.push('');

  const amountStr = lines[8].trim();
  const cents = parseInt(amountStr, 10);
  if (!Number.isFinite(cents) || cents < 0) {
    throw new Error('UPN QR has no valid amount.');
  }
  const amount = (cents / 100).toFixed(2);

  return {
    amount,
    purposeCode: lines[11].trim(),
    purpose: lines[12].trim(),
    dueDate: lines[13].trim(),
    recipientIban: lines[14].replace(/\s/g, '').trim().toUpperCase(),
    recipientRef: lines[15].trim(),
    recipientName: lines[16].trim(),
    recipientAddress: lines[17].trim(),
    recipientCity: lines[18].trim(),
  };
}

// EPC069-12 / EPC QR (SEPA Credit Transfer) format
function buildEPC(upn) {
  if (!upn.recipientIban) throw new Error('UPN QR missing recipient IBAN.');
  if (!upn.recipientName) throw new Error('UPN QR missing recipient name.');

  const remittanceParts = [];
  if (upn.recipientRef) remittanceParts.push(upn.recipientRef);
  if (upn.purpose) remittanceParts.push(upn.purpose);
  const remittance = remittanceParts.join(' ').substring(0, 140);

  const fields = [
    'BCD',                                       // Service tag
    '002',                                       // Version (BIC optional)
    '1',                                         // UTF-8
    'SCT',                                       // SEPA Credit Transfer
    '',                                          // BIC (optional)
    upn.recipientName.substring(0, 70),          // Beneficiary name
    upn.recipientIban,                           // Beneficiary IBAN
    `EUR${upn.amount}`,                          // Amount
    upn.purposeCode.substring(0, 4),             // Purpose (optional)
    '',                                          // Structured remittance (RF only)
    remittance,                                  // Unstructured remittance
    '',                                          // Beneficiary-to-originator info
  ];
  return fields.join('\n');
}

function renderResult(upn, epc) {
  errorEl.classList.add('hidden');
  resultEl.classList.remove('hidden');

  const qr = qrcode(0, 'M');
  qr.addData(epc);
  qr.make();
  qrEl.innerHTML = qr.createSvgTag({ cellSize: 6, margin: 2, scalable: true });

  const rows = [
    ['Recipient', upn.recipientName],
    ['IBAN', upn.recipientIban],
    ['Amount', `€${upn.amount}`],
    ['Reference', upn.recipientRef || '—'],
    ['Purpose', upn.purpose || '—'],
    ['Due', upn.dueDate || '—'],
  ];
  detailsEl.innerHTML = rows.map(([k, v]) =>
    `<dt>${escapeHtml(k)}</dt><dd>${escapeHtml(v)}</dd>`).join('');
  payloadEl.textContent = epc;

  resultEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function showError(msg) {
  errorEl.textContent = msg;
  errorEl.classList.remove('hidden');
  resultEl.classList.add('hidden');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}
</script>
</body>
</html>
